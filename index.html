<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OPEN WORLD" />
  <title>OPEN WORLD — Browser Edition</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- MapLibre GL JS -->
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

  <!-- Google Fonts: Rajdhani (HUD) + Share Tech Mono (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    /* ─── CSS VARIABLES ─────────────────────────────────────────── */
    :root {
      --neon:      #39ff6a;
      --neon-dim:  #1a7a35;
      --amber:     #ffb830;
      --red:       #ff3b3b;
      --bg:        #050a05;
      --panel:     rgba(5, 12, 5, 0.82);
      --border:    rgba(57, 255, 106, 0.22);
      --text:      #c8f5d2;
      --text-dim:  #5c8a65;
      --font-hud:  'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
      --radius:    4px;
      --transition: 0.18s ease;
    }

    /* ─── RESET ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font-hud);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ─── MAP CONTAINER ─────────────────────────────────────────── */
    #map {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
    }

    /* ─── SCANLINE OVERLAY ──────────────────────────────────────── */
    #scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      mix-blend-mode: multiply;
    }

    /* Vignette */
    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background: radial-gradient(ellipse at center,
        transparent 55%,
        rgba(0, 5, 0, 0.72) 100%
      );
    }

    /* ─── HUD WRAPPER ────────────────────────────────────────────── */
    #hud {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      display: flex;
      flex-direction: column;
    }

    /* ─── TOP BAR ────────────────────────────────────────────────── */
    #top-bar {
      pointer-events: all;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
      background: linear-gradient(to bottom, rgba(5,12,5,0.9) 0%, transparent 100%);
    }

    /* Logo / Title */
    #logo {
      display: flex;
      flex-direction: column;
      line-height: 1;
      margin-right: 4px;
      white-space: nowrap;
    }
    #logo .title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--neon);
      text-shadow: 0 0 12px var(--neon);
    }
    #logo .subtitle {
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--text-dim);
      letter-spacing: 0.25em;
    }

    /* Search bar */
    #search-wrap {
      flex: 1;
      position: relative;
      max-width: 480px;
    }
    #search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--neon-dim);
      font-size: 14px;
      pointer-events: none;
    }
    #search-input {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 10px 9px 34px;
      color: var(--text);
      font-family: var(--font-hud);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      backdrop-filter: blur(8px);
    }
    #search-input::placeholder { color: var(--text-dim); }
    #search-input:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 2px rgba(57,255,106,0.12), 0 0 18px rgba(57,255,106,0.1);
    }
    #search-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: rgba(5,10,5,0.97);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: none;
      backdrop-filter: blur(12px);
      z-index: 100;
      max-height: 260px;
      overflow-y: auto;
    }
    #search-results.open { display: block; }
    .search-item {
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid rgba(57,255,106,0.08);
      transition: background var(--transition);
      line-height: 1.4;
    }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover { background: rgba(57,255,106,0.1); color: var(--neon); }
    .search-item .place-name { font-weight: 600; }
    .search-item .place-sub  { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* HUD Buttons */
    .hud-btn {
      pointer-events: all;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: all var(--transition);
      backdrop-filter: blur(8px);
      flex-shrink: 0;
      outline: none;
    }
    .hud-btn:hover, .hud-btn.active {
      border-color: var(--neon);
      color: var(--neon);
      box-shadow: 0 0 12px rgba(57,255,106,0.25);
    }
    .hud-btn.active { background: rgba(57,255,106,0.08); }
    .hud-btn.danger { color: var(--red); border-color: rgba(255,59,59,0.3); }
    .hud-btn.danger:hover { border-color: var(--red); box-shadow: 0 0 12px rgba(255,59,59,0.3); }

    /* ─── BOTTOM BAR ─────────────────────────────────────────────── */
    #bottom-bar {
      margin-top: auto;
      padding: 10px 16px 18px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      background: linear-gradient(to top, rgba(5,12,5,0.85) 0%, transparent 100%);
      pointer-events: none;
    }

    /* ─── MINIMAP / RADAR ────────────────────────────────────────── */
    #radar-wrap {
      pointer-events: all;
      position: relative;
      width: 140px;
      height: 140px;
      flex-shrink: 0;
    }
    #radar-border {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--neon);
      box-shadow: 0 0 20px rgba(57,255,106,0.35), inset 0 0 20px rgba(0,0,0,0.6);
      pointer-events: none;
      z-index: 2;
    }
    #radar-border::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 1px solid rgba(57,255,106,0.15);
    }
    #minimap {
      width: 100%; height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: #030803;
    }
    /* Radar sweep animation */
    #radar-sweep {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
      overflow: hidden;
    }
    #radar-sweep::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 50%; height: 50%;
      transform-origin: 0% 100%;
      background: conic-gradient(
        from 0deg,
        transparent 0deg,
        rgba(57,255,106,0.25) 50deg,
        transparent 50deg
      );
      animation: sweep 3s linear infinite;
    }
    @keyframes sweep {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    /* Center dot */
    #radar-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 8px;
      background: var(--neon);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--neon);
      z-index: 4;
      pointer-events: none;
    }
    #radar-compass {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--neon);
      letter-spacing: 0.1em;
    }

    /* ─── STATS PANEL (right side of bottom) ─────────────────────── */
    #stats-panel {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 4px;
      pointer-events: none;
    }
    .stat-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
    }
    .stat-row .stat-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .stat-row .stat-val {
      color: var(--neon);
      font-size: 13px;
      min-width: 70px;
      text-align: right;
    }
    .stat-divider {
      width: 80px;
      height: 1px;
      background: var(--border);
      margin: 2px 0 2px auto;
    }

    /* ─── VEHICLE MODE BADGE ─────────────────────────────────────── */
    #mode-badge {
      position: fixed;
      top: 68px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      background: rgba(255, 184, 48, 0.12);
      border: 1px solid var(--amber);
      border-radius: 3px;
      padding: 4px 14px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--amber);
      text-shadow: 0 0 10px var(--amber);
      display: none;
      pointer-events: none;
    }
    #mode-badge.show { display: block; animation: fadein 0.3s ease; }
    @keyframes fadein { from { opacity: 0; transform: translateX(-50%) translateY(-6px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* ─── NOTIFICATION TOAST ─────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      z-index: 50;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 18px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--neon);
      letter-spacing: 0.1em;
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── MOBILE JOYSTICK ────────────────────────────────────────── */
    #joystick-zone {
      pointer-events: all;
      position: fixed;
      bottom: 90px;
      left: 20px;
      z-index: 30;
      display: none; /* shown on touch */
    }
    #joystick-outer {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: rgba(5,12,5,0.55);
      border: 2px solid rgba(57,255,106,0.3);
      position: relative;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
      touch-action: none;
    }
    #joystick-inner {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(57,255,106,0.5), rgba(57,255,106,0.15));
      border: 1.5px solid rgba(57,255,106,0.6);
      position: absolute;
      box-shadow: 0 0 14px rgba(57,255,106,0.3);
      transition: transform 0.05s ease;
    }

    /* ─── RIGHT ACTION BUTTONS (mobile) ─────────────────────────── */
    #right-actions {
      pointer-events: all;
      position: fixed;
      bottom: 100px;
      right: 20px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    /* ─── SPEED INDICATOR ────────────────────────────────────────── */
    #speedometer {
      position: fixed;
      bottom: 165px;
      right: 16px;
      z-index: 25;
      text-align: center;
      pointer-events: none;
    }
    #speed-val {
      font-family: var(--font-mono);
      font-size: 32px;
      color: var(--neon);
      text-shadow: 0 0 15px var(--neon);
      line-height: 1;
    }
    #speed-unit {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.2em;
    }

    /* ─── LOADING SCREEN ─────────────────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    #loading-logo {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--neon);
      text-shadow: 0 0 30px var(--neon), 0 0 60px rgba(57,255,106,0.3);
    }
    #loading-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    #loading-bar-wrap {
      width: 240px;
      height: 2px;
      background: rgba(57,255,106,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    #loading-bar {
      height: 100%;
      background: var(--neon);
      box-shadow: 0 0 10px var(--neon);
      width: 0%;
      transition: width 0.4s ease;
    }
    #loading-status {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--neon-dim);
      letter-spacing: 0.15em;
    }

    /* ─── MAPLIBRE OVERRIDES ─────────────────────────────────────── */
    .maplibregl-ctrl-attrib,
    .maplibregl-ctrl-logo { display: none !important; }
    .maplibregl-canvas { outline: none; }
    /* Hide default controls */
    .maplibregl-ctrl-top-right,
    .maplibregl-ctrl-top-left,
    .maplibregl-ctrl-bottom-right,
    .maplibregl-ctrl-bottom-left { display: none !important; }

    /* ─── PLAYER MARKER ─────────────────────────────────────────── */
    .player-marker-el {
      width: 24px;
      height: 24px;
      position: relative;
    }
    .player-dot {
      width: 14px; height: 14px;
      background: var(--neon);
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 16px var(--neon), 0 0 30px rgba(57,255,106,0.5);
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .player-ring {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(57,255,106,0.5);
      position: absolute;
      top: 0; left: 0;
      animation: pulse-ring 1.8s ease-out infinite;
    }
    @keyframes pulse-ring {
      0%   { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    /* ─── RESPONSIVE ─────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #logo { display: none; }
      #radar-wrap { width: 110px; height: 110px; }
      #stats-panel { display: none; }
      #joystick-zone { display: block; }
    }
    @media (min-width: 601px) {
      #right-actions .hud-btn { display: none; }
    }

    /* Crosshair center indicator */
    #crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 15;
      opacity: 0.15;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: var(--neon);
    }
    #crosshair::before {
      width: 12px; height: 1px;
      top: 0; left: -6px;
    }
    #crosshair::after {
      width: 1px; height: 12px;
      top: -6px; left: 0;
    }

    /* Controls hint */
    #controls-hint {
      position: fixed;
      bottom: 185px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      pointer-events: none;
      z-index: 20;
      opacity: 0.5;
    }
    @media (max-width: 600px) { #controls-hint { display: none; } }
  </style>
</head>
<body>

<!-- ─── LOADING SCREEN ───────────────────────────────────────── -->
<div id="loading">
  <div id="loading-logo">OPEN WORLD</div>
  <div id="loading-sub">Browser Edition · v1.0</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-status">INITIALIZING ENGINE...</div>
</div>

<!-- ─── MAP ──────────────────────────────────────────────────── -->
<div id="map"></div>

<!-- ─── OVERLAYS ─────────────────────────────────────────────── -->
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="crosshair"></div>

<!-- ─── MODE BADGE ───────────────────────────────────────────── -->
<div id="mode-badge">⚡ VEHICLE MODE</div>

<!-- ─── TOAST ─────────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ─── SPEEDOMETER ───────────────────────────────────────────── -->
<div id="speedometer">
  <div id="speed-val">0</div>
  <div id="speed-unit">KM/H</div>
</div>

<!-- ─── CONTROLS HINT ─────────────────────────────────────────── -->
<div id="controls-hint">[ W A S D ] MOVE &nbsp;|&nbsp; [ SCROLL ] ZOOM &nbsp;|&nbsp; [ RIGHT DRAG ] ROTATE</div>

<!-- ─── HUD ───────────────────────────────────────────────────── -->
<div id="hud">

  <!-- TOP BAR -->
  <div id="top-bar">
    <div id="logo">
      <span class="title">OPEN WORLD</span>
      <span class="subtitle">BROWSER EDITION</span>
    </div>

    <div id="search-wrap">
      <span id="search-icon">⌖</span>
      <input type="text" id="search-input" placeholder="Search city, address, place..." autocomplete="off" />
      <div id="search-results"></div>
    </div>

    <!-- GPS -->
    <button class="hud-btn" id="btn-gps" title="Go to my location">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
      </svg>
    </button>

    <!-- Vehicle -->
    <button class="hud-btn" id="btn-vehicle" title="Toggle vehicle mode">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
      </svg>
    </button>

    <!-- Satellite -->
    <button class="hud-btn" id="btn-satellite" title="Toggle satellite view">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3.5 6.5l3-3L21 17.5l-3 3L3.5 6.5z"/><path d="M8 8l4 4"/><path d="M13.5 3a6.5 6.5 0 0 1 7.5 7.5"/>
      </svg>
    </button>

    <!-- 3D Toggle -->
    <button class="hud-btn" id="btn-3d" title="Toggle 3D buildings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      </svg>
    </button>

    <!-- Fullscreen -->
    <button class="hud-btn" id="btn-fullscreen" title="Fullscreen">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
    </button>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottom-bar">

    <!-- RADAR / MINIMAP -->
    <div id="radar-wrap">
      <div id="minimap"></div>
      <div id="radar-border"></div>
      <div id="radar-sweep"></div>
      <div id="radar-center"></div>
      <div id="radar-compass">N</div>
    </div>

    <!-- STATS PANEL -->
    <div id="stats-panel">
      <div class="stat-row">
        <span class="stat-label">LAT</span>
        <span class="stat-val" id="stat-lat">0.000000</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">LNG</span>
        <span class="stat-val" id="stat-lng">0.000000</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-row">
        <span class="stat-label">ZOOM</span>
        <span class="stat-val" id="stat-zoom">12.0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">HEADING</span>
        <span class="stat-val" id="stat-heading">000°</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-row">
        <span class="stat-label">MODE</span>
        <span class="stat-val" id="stat-mode">FOOT</span>
      </div>
    </div>

  </div>
</div><!-- /#hud -->

<!-- ─── MOBILE JOYSTICK ───────────────────────────────────────── -->
<div id="joystick-zone">
  <div id="joystick-outer">
    <div id="joystick-inner"></div>
  </div>
</div>

<!-- ─── MOBILE RIGHT ACTIONS ─────────────────────────────────── -->
<div id="right-actions">
  <button class="hud-btn" id="btn-gps-m" title="GPS">📍</button>
  <button class="hud-btn" id="btn-vehicle-m" title="Vehicle">🚗</button>
  <button class="hud-btn" id="btn-sat-m" title="Satellite">🛰</button>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   OPEN WORLD — GTA-Style Browser Map Game
   Core JavaScript
═══════════════════════════════════════════════════════════════ */

const MAPTILER_KEY = 'SnLVij6NhHPG0XBBao4k';

/* ── STYLE URLS ──────────────────────────────────────────────── */
const STYLES = {
  streets:   `https://api.maptiler.com/maps/streets-v2/style.json?key=${MAPTILER_KEY}`,
  satellite: `https://api.maptiler.com/maps/satellite/style.json?key=${MAPTILER_KEY}`,
};

/* ── GAME STATE ──────────────────────────────────────────────── */
const state = {
  player:        { lng: -74.006, lat: 40.7128 },  // Default: NYC
  heading:       0,       // degrees
  speed:         0,       // km/h display
  vehicleMode:   false,
  satelliteMode: false,
  mode3D:        false,
  following:     true,    // camera follows player
  map:           null,
  minimap:       null,
  playerMarker:  null,
  keys:          {},
  joystick:      { active: false, dx: 0, dy: 0 },
  lastFrame:     0,
  searchTimer:   null,
};

/* ── MOVEMENT CONFIG ─────────────────────────────────────────── */
const MOVE = {
  footSpeed:    0.00012,
  vehicleSpeed: 0.00065,
  friction:     0.82,
  velX: 0, velY: 0,
};

/* ── LOADING SEQUENCE ────────────────────────────────────────── */
const loadingBar    = document.getElementById('loading-bar');
const loadingStatus = document.getElementById('loading-status');
const loadingEl     = document.getElementById('loading');

function setLoading(pct, msg) {
  loadingBar.style.width = pct + '%';
  loadingStatus.textContent = msg;
}

/* ── INIT MAP ────────────────────────────────────────────────── */
function initMap() {
  setLoading(20, 'LOADING MAP ENGINE...');

  state.map = new maplibregl.Map({
    container: 'map',
    style: STYLES.streets,
    center: [state.player.lng, state.player.lat],
    zoom: 14,
    pitch: 45,
    bearing: 0,
    antialias: true,
    attributionControl: false,
  });

  state.map.on('load', onMapLoad);
  state.map.on('move', onMapMove);
}

/* ── MAP LOAD HANDLER ────────────────────────────────────────── */
function onMapLoad() {
  setLoading(55, 'BUILDING 3D WORLD...');

  // Add 3D buildings layer
  add3DBuildings();

  setLoading(75, 'SPAWNING PLAYER...');

  // Create player marker
  const el = document.createElement('div');
  el.className = 'player-marker-el';
  el.innerHTML = '<div class="player-ring"></div><div class="player-dot"></div>';

  state.playerMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
    .setLngLat([state.player.lng, state.player.lat])
    .addTo(state.map);

  setLoading(88, 'INITIALIZING MINIMAP...');
  initMinimap();

  setLoading(95, 'BINDING CONTROLS...');
  bindControls();

  setLoading(100, 'READY.');

  // Hide loading screen after brief pause
  setTimeout(() => {
    loadingEl.style.transition = 'opacity 0.6s ease';
    loadingEl.style.opacity = '0';
    setTimeout(() => loadingEl.remove(), 700);
    showToast('WORLD LOADED — USE WASD TO MOVE');
  }, 600);

  // Start game loop
  requestAnimationFrame(gameLoop);
}

/* ── 3D BUILDINGS ────────────────────────────────────────────── */
function add3DBuildings() {
  if (!state.map.getLayer('3d-buildings')) {
    state.map.addLayer({
      id: '3d-buildings',
      source: 'composite',
      'source-layer': 'building',
      filter: ['==', 'extrude', 'true'],
      type: 'fill-extrusion',
      minzoom: 13,
      paint: {
        'fill-extrusion-color': [
          'interpolate', ['linear'], ['get', 'height'],
          0, '#0a1a0a',
          50, '#0d200d',
          200, '#112811',
        ],
        'fill-extrusion-height': ['get', 'height'],
        'fill-extrusion-base': ['get', 'min_height'],
        'fill-extrusion-opacity': 0.82,
      },
      layout: { visibility: 'none' }, // hidden until toggled
    });
  }
}

/* ── MINIMAP ─────────────────────────────────────────────────── */
function initMinimap() {
  state.minimap = new maplibregl.Map({
    container: 'minimap',
    style: STYLES.streets,
    center: [state.player.lng, state.player.lat],
    zoom: 11,
    interactive: false,
    attributionControl: false,
    pitch: 0,
  });
}

/* ── CAMERA FOLLOW ───────────────────────────────────────────── */
function followPlayer(smooth = true) {
  if (!state.following) return;
  state.map.easeTo({
    center: [state.player.lng, state.player.lat],
    bearing: state.heading,
    pitch: state.vehicleMode ? 55 : 45,
    duration: smooth ? 120 : 0,
    easing: t => t,
  });
  if (state.minimap) {
    state.minimap.setCenter([state.player.lng, state.player.lat]);
  }
}

/* ── UPDATE PLAYER MARKER ────────────────────────────────────── */
function updateMarker() {
  if (state.playerMarker) {
    state.playerMarker.setLngLat([state.player.lng, state.player.lat]);
  }
}

/* ── MAP MOVE EVENT ─────────────────────────────────────────── */
function onMapMove() {
  const { lng, lat } = state.map.getCenter();
  const zoom    = state.map.getZoom();
  const bearing = state.map.getBearing();

  document.getElementById('stat-lat').textContent  = lat.toFixed(6);
  document.getElementById('stat-lng').textContent  = lng.toFixed(6);
  document.getElementById('stat-zoom').textContent = zoom.toFixed(1);
  const deg = ((bearing % 360) + 360) % 360;
  document.getElementById('stat-heading').textContent = String(Math.round(deg)).padStart(3, '0') + '°';
}

/* ── GAME LOOP ───────────────────────────────────────────────── */
function gameLoop(timestamp) {
  const dt = Math.min(timestamp - state.lastFrame, 50); // cap at 50ms
  state.lastFrame = timestamp;

  handleMovement(dt);
  updateHUD();

  requestAnimationFrame(gameLoop);
}

/* ── MOVEMENT ENGINE ─────────────────────────────────────────── */
function handleMovement(dt) {
  const spd = state.vehicleMode ? MOVE.vehicleSpeed : MOVE.footSpeed;
  const rad = (state.heading * Math.PI) / 180;

  let ax = 0, ay = 0;

  /* Keyboard input */
  if (state.keys['w'] || state.keys['arrowup'])    { ax -= Math.sin(rad); ay += Math.cos(rad); }
  if (state.keys['s'] || state.keys['arrowdown'])  { ax += Math.sin(rad); ay -= Math.cos(rad); }
  if (state.keys['a'] || state.keys['arrowleft'])  { ax -= Math.cos(rad); ay -= Math.sin(rad); }
  if (state.keys['d'] || state.keys['arrowright']) { ax += Math.cos(rad); ay += Math.sin(rad); }

  /* Joystick input */
  if (state.joystick.active) {
    const jx = state.joystick.dx;
    const jy = state.joystick.dy;
    ax += jx * Math.cos(rad) - jy * Math.sin(rad);
    ay += jx * Math.sin(rad) + jy * Math.cos(rad);
  }

  /* Normalize diagonal */
  const mag = Math.sqrt(ax * ax + ay * ay);
  if (mag > 1) { ax /= mag; ay /= mag; }

  /* Apply acceleration */
  const factor = (dt / 16) * spd;
  MOVE.velX = MOVE.velX * MOVE.friction + ax * factor;
  MOVE.velY = MOVE.velY * MOVE.friction + ay * factor;

  /* Dead zone */
  if (Math.abs(MOVE.velX) < 1e-9) MOVE.velX = 0;
  if (Math.abs(MOVE.velY) < 1e-9) MOVE.velY = 0;

  const moving = Math.abs(MOVE.velX) + Math.abs(MOVE.velY) > 1e-7;

  if (moving) {
    state.player.lng += MOVE.velX;
    state.player.lat += MOVE.velY;

    /* Clamp lat */
    state.player.lat = Math.max(-85, Math.min(85, state.player.lat));

    updateMarker();
    followPlayer(true);

    /* Speed calc (rough) */
    const dist = Math.sqrt(MOVE.velX * MOVE.velX + MOVE.velY * MOVE.velY);
    state.speed = Math.round(dist * 111000 * 3600 / 16);
  } else {
    state.speed = 0;
  }
}

/* ── HUD UPDATE ──────────────────────────────────────────────── */
function updateHUD() {
  document.getElementById('speed-val').textContent = state.speed;
  document.getElementById('stat-lat').textContent  = state.player.lat.toFixed(6);
  document.getElementById('stat-lng').textContent  = state.player.lng.toFixed(6);
}

/* ── CONTROLS BINDING ────────────────────────────────────────── */
function bindControls() {

  /* ── KEYBOARD ──────────────────────────────────────────────── */
  document.addEventListener('keydown', e => {
    state.keys[e.key.toLowerCase()] = true;
    // Stop map panning from arrow keys
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
      e.preventDefault();
    }
  });
  document.addEventListener('keyup', e => {
    state.keys[e.key.toLowerCase()] = false;
  });

  /* ── GPS BUTTON ────────────────────────────────────────────── */
  function doGPS() {
    if (!navigator.geolocation) { showToast('GEOLOCATION NOT AVAILABLE'); return; }
    showToast('ACQUIRING GPS SIGNAL...');
    navigator.geolocation.getCurrentPosition(pos => {
      const { longitude, latitude } = pos.coords;
      state.player.lng = longitude;
      state.player.lat = latitude;
      updateMarker();
      state.map.flyTo({ center: [longitude, latitude], zoom: 15, pitch: 45, duration: 1400, essential: true });
      if (state.minimap) state.minimap.setCenter([longitude, latitude]);
      showToast('GPS LOCK ACQUIRED');
    }, () => showToast('GPS SIGNAL LOST'));
  }
  document.getElementById('btn-gps').addEventListener('click', doGPS);
  document.getElementById('btn-gps-m').addEventListener('click', doGPS);

  /* ── VEHICLE MODE ──────────────────────────────────────────── */
  function toggleVehicle() {
    state.vehicleMode = !state.vehicleMode;
    const btn  = document.getElementById('btn-vehicle');
    const btnM = document.getElementById('btn-vehicle-m');
    const badge = document.getElementById('mode-badge');

    [btn, btnM].forEach(b => b.classList.toggle('active', state.vehicleMode));
    badge.classList.toggle('show', state.vehicleMode);
    document.getElementById('stat-mode').textContent = state.vehicleMode ? 'VEHICLE' : 'FOOT';
    document.getElementById('stat-mode').style.color = state.vehicleMode ? 'var(--amber)' : 'var(--neon)';
    showToast(state.vehicleMode ? '🚗 VEHICLE MODE ON' : '🚶 FOOT MODE ON');
  }
  document.getElementById('btn-vehicle').addEventListener('click', toggleVehicle);
  document.getElementById('btn-vehicle-m').addEventListener('click', toggleVehicle);

  /* ── SATELLITE VIEW ────────────────────────────────────────── */
  function toggleSatellite() {
    state.satelliteMode = !state.satelliteMode;
    const btn  = document.getElementById('btn-satellite');
    const btnM = document.getElementById('btn-sat-m');
    [btn, btnM].forEach(b => b.classList.toggle('active', state.satelliteMode));
    state.map.setStyle(state.satelliteMode ? STYLES.satellite : STYLES.streets);
    state.map.once('style.load', () => {
      add3DBuildings();
      if (state.mode3D) {
        state.map.setLayoutProperty('3d-buildings', 'visibility', 'visible');
      }
    });
    if (state.minimap) {
      state.minimap.setStyle(state.satelliteMode ? STYLES.satellite : STYLES.streets);
    }
    showToast(state.satelliteMode ? '🛰 SATELLITE VIEW' : '🗺 MAP VIEW');
  }
  document.getElementById('btn-satellite').addEventListener('click', toggleSatellite);
  document.getElementById('btn-sat-m').addEventListener('click', toggleSatellite);

  /* ── 3D BUILDINGS ──────────────────────────────────────────── */
  document.getElementById('btn-3d').addEventListener('click', () => {
    state.mode3D = !state.mode3D;
    document.getElementById('btn-3d').classList.toggle('active', state.mode3D);
    try {
      state.map.setLayoutProperty('3d-buildings', 'visibility', state.mode3D ? 'visible' : 'none');
      state.map.easeTo({ pitch: state.mode3D ? 60 : 45, duration: 600 });
    } catch(e) {}
    showToast(state.mode3D ? '🏙 3D BUILDINGS ON' : '🗺 3D BUILDINGS OFF');
  });

  /* ── FULLSCREEN ────────────────────────────────────────────── */
  document.getElementById('btn-fullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  });

  /* ── SEARCH BAR ────────────────────────────────────────────── */
  const searchInput   = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');

  searchInput.addEventListener('input', () => {
    clearTimeout(state.searchTimer);
    const q = searchInput.value.trim();
    if (q.length < 2) { searchResults.classList.remove('open'); return; }
    state.searchTimer = setTimeout(() => doSearch(q), 380);
  });

  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Escape') { searchResults.classList.remove('open'); searchInput.blur(); }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#search-wrap')) searchResults.classList.remove('open');
  });

  async function doSearch(q) {
    try {
      const res  = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6`,
        { headers: { 'Accept-Language': 'en' } }
      );
      const data = await res.json();
      renderResults(data);
    } catch(e) {
      searchResults.innerHTML = '<div class="search-item">Network error</div>';
      searchResults.classList.add('open');
    }
  }

  function renderResults(results) {
    if (!results.length) {
      searchResults.innerHTML = '<div class="search-item" style="color:var(--text-dim)">No results found</div>';
      searchResults.classList.add('open');
      return;
    }
    searchResults.innerHTML = results.map(r => `
      <div class="search-item" data-lng="${r.lon}" data-lat="${r.lat}">
        <div class="place-name">${r.display_name.split(',')[0]}</div>
        <div class="place-sub">${r.display_name.split(',').slice(1,3).join(',').trim()}</div>
      </div>
    `).join('');
    searchResults.classList.add('open');

    searchResults.querySelectorAll('.search-item').forEach(item => {
      item.addEventListener('click', () => {
        const lng = parseFloat(item.dataset.lng);
        const lat = parseFloat(item.dataset.lat);
        state.player.lng = lng;
        state.player.lat = lat;
        updateMarker();
        state.map.flyTo({ center: [lng, lat], zoom: 15, pitch: 45, duration: 1600, essential: true });
        if (state.minimap) state.minimap.setCenter([lng, lat]);
        searchResults.classList.remove('open');
        searchInput.value = item.querySelector('.place-name').textContent;
        showToast('NAVIGATING...');
      });
    });
  }

  /* ── JOYSTICK (mobile) ─────────────────────────────────────── */
  const outer = document.getElementById('joystick-outer');
  const inner = document.getElementById('joystick-inner');
  const maxR  = 32; // max radius

  let jStartX = 0, jStartY = 0;

  outer.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    const rect = outer.getBoundingClientRect();
    jStartX = rect.left + rect.width / 2;
    jStartY = rect.top  + rect.height / 2;
    state.joystick.active = true;
  }, { passive: false });

  outer.addEventListener('touchmove', e => {
    e.preventDefault();
    const t  = e.touches[0];
    let dx = t.clientX - jStartX;
    let dy = t.clientY - jStartY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > maxR) { dx = dx / dist * maxR; dy = dy / dist * maxR; }
    inner.style.transform = `translate(${dx}px, ${dy}px)`;
    state.joystick.dx =  dx / maxR;
    state.joystick.dy = -dy / maxR;
  }, { passive: false });

  ['touchend', 'touchcancel'].forEach(ev => {
    outer.addEventListener(ev, () => {
      inner.style.transform = 'translate(0,0)';
      state.joystick = { active: false, dx: 0, dy: 0 };
    });
  });

  /* Show joystick on touch-capable devices */
  window.addEventListener('touchstart', () => {
    document.getElementById('joystick-zone').style.display = 'block';
  }, { once: true });

  /* Disable map drag-to-pan interference with joystick */
  state.map.on('touchstart', e => {
    const joystickEl = document.getElementById('joystick-zone');
    const rect = joystickEl.getBoundingClientRect();
    const t = e.originalEvent.touches[0];
    if (t.clientX >= rect.left && t.clientX <= rect.right &&
        t.clientY >= rect.top  && t.clientY <= rect.bottom) {
      // swallow — don't pan map
    }
  });
}

/* ── TOAST NOTIFICATIONS ─────────────────────────────────────── */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ── HEADING SYNC (rotate marker with bearing) ───────────────── */
function syncHeading() {
  state.heading = state.map.getBearing();
}

/* ── REGISTER SERVICE WORKER ─────────────────────────────────── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}

/* ── BOOT ────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  setLoading(5, 'LOADING ASSETS...');
  setTimeout(initMap, 200);
});
</script>
</body>
</html>
