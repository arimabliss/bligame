<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Open World Map Game</title>

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
}

#map{
width:100vw;
height:100vh;
}

/* HUD */

#searchBox{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
z-index:5;
}

#searchBox input{
padding:10px;
border-radius:8px;
border:none;
width:260px;
font-size:15px;
}

/* buttons */

button{
position:absolute;
right:15px;
padding:10px 14px;
border:none;
border-radius:8px;
background:black;
color:white;
z-index:5;
}

#gps{top:15px;}
#sat{top:65px;}
#fullscreen{top:115px;}

/* player */

.player{
width:22px;
height:22px;
background:#ff3b3b;
border-radius:50%;
border:3px solid white;
}

/* joystick */

#joyBase{
position:absolute;
bottom:35px;
left:30px;
width:140px;
height:140px;
background:rgba(0,0,0,0.4);
border-radius:50%;
z-index:10;
}

#joyStick{
position:absolute;
width:60px;
height:60px;
background:white;
border-radius:50%;
top:40px;
left:40px;
}

</style>
</head>

<body>

<div id="searchBox">
<input id="search" placeholder="Search location...">
</div>

<button id="gps">GPS</button>
<button id="sat">Satellite</button>
<button id="fullscreen">Fullscreen</button>

<div id="map"></div>

<div id="joyBase">
<div id="joyStick"></div>
</div>

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<script>

const API_KEY="SnLVij6NhHPG0XBBao4k";

let streetStyle=`https://api.maptiler.com/maps/streets/style.json?key=${API_KEY}`;
let satelliteStyle=`https://api.maptiler.com/maps/satellite/style.json?key=${API_KEY}`;

let currentStyle=streetStyle;

/* MAP */

const map=new maplibregl.Map({
container:'map',
style:streetStyle,
center:[78.96,22.59],
zoom:5,
pitch:60,
bearing:0,
antialias:true
});

map.addControl(new maplibregl.NavigationControl());

/* PLAYER */

let playerPos=[78.96,22.59];

const el=document.createElement("div");
el.className="player";

const player=new maplibregl.Marker(el)
.setLngLat(playerPos)
.addTo(map);

function updatePlayer(){

player.setLngLat(playerPos);

map.easeTo({
center:playerPos,
duration:0
});

}

/* KEYBOARD MOVEMENT */

document.addEventListener("keydown",(e)=>{

const speed=0.001;

if(e.key==="w") playerPos[1]+=speed;
if(e.key==="s") playerPos[1]-=speed;
if(e.key==="a") playerPos[0]-=speed;
if(e.key==="d") playerPos[0]+=speed;

updatePlayer();

});

/* JOYSTICK */

const stick=document.getElementById("joyStick");
const base=document.getElementById("joyBase");

let dragging=false;

base.addEventListener("touchstart",()=>dragging=true);

document.addEventListener("touchend",()=>{
dragging=false;
stick.style.transform="translate(0,0)";
});

document.addEventListener("touchmove",(e)=>{

if(!dragging) return;

let rect=base.getBoundingClientRect();

let x=e.touches[0].clientX-rect.left-70;
let y=e.touches[0].clientY-rect.top-70;

let dist=Math.sqrt(x*x+y*y);
let max=40;

if(dist>max){
x=x*max/dist;
y=y*max/dist;
}

stick.style.transform=`translate(${x}px,${y}px)`;

playerPos[0]+=x*0.00005;
playerPos[1]-=y*0.00005;

updatePlayer();

});

/* SEARCH */

document.getElementById("search").addEventListener("keypress",async function(e){

if(e.key==="Enter"){

let q=this.value;

let res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);

let data=await res.json();

if(data.length){

playerPos=[parseFloat(data[0].lon),parseFloat(data[0].lat)];

map.flyTo({
center:playerPos,
zoom:16
});

updatePlayer();

}

}

});

/* GPS */

document.getElementById("gps").onclick=()=>{

navigator.geolocation.getCurrentPosition(pos=>{

playerPos=[pos.coords.longitude,pos.coords.latitude];

map.flyTo({
center:playerPos,
zoom:16
});

updatePlayer();

});

};

/* SATELLITE TOGGLE */

let sat=false;

document.getElementById("sat").onclick=()=>{

sat=!sat;

map.setStyle(sat ? satelliteStyle : streetStyle);

};

/* FULLSCREEN */

document.getElementById("fullscreen").onclick=()=>{

if(!document.fullscreenElement){

document.documentElement.requestFullscreen();

}else{

document.exitFullscreen();

}

};

</script>

</body>
</html>
